PackageName: Serv
PackageUrl: https://github.com/TillmanBuildsTech/serv
License: MIT
ShortDescription: A cross-platform Windows service / systemd / launchd process supervisor.
Description: >-
  Serv installs and supervises a long-running executable as a native Windows
  service (or systemd/launchd unit on Linux/macOS), handling process
  lifecycle, graceful shutdown, automatic restart with backoff, log capture
  and rotation, and lifecycle hooks.
