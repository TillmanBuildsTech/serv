name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
  
permissions:
  contents: write

jobs:
  check:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(tr -d '[:space:]' < internal/version/VERSION)" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/v${{ steps.version.outputs.version }}$"; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build and package
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          set -e
          mkdir -p out
          bin=serv
          if [ "$GOOS" = "windows" ]; then bin=serv.exe; fi
          go build -o "$bin" ./cmd/serv
          if [ "$GOOS" = "windows" ]; then
            zip "out/serv-${GOOS}-${GOARCH}.zip" "$bin"
          else
            tar -czf "out/serv-${GOOS}-${GOARCH}.tar.gz" "$bin"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: serv-${{ matrix.goos }}-${{ matrix.goarch }}
          path: out/*

  release:
    needs: [check, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Generate GitHub App token
        id: app_token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.TBT_APP_ID }}
          private_key: ${{ secrets.TBT_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ steps.app_token.outputs.token }}

      - uses: actions/download-artifact@v4
        with:
          path: out
          merge-multiple: true

      - name: Tag release
        env:
          VERSION: ${{ needs.check.outputs.version }}
        run: |
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Update packaging manifests
        env:
          VERSION: ${{ needs.check.outputs.version }}
        run: python3 scripts/update_packaging_version.py "$VERSION" out

      - name: Commit packaging manifest updates
        env:
          VERSION: ${{ needs.check.outputs.version }}
          APP_ID: ${{ secrets.TBT_APP_ID }}
        run: |
          git config user.name "tbt-devops[bot]"
          git config user.email "${APP_ID}+tbt-devops[bot]@users.noreply.github.com"
          git add packaging/
          if git diff --cached --quiet; then
            echo "No packaging changes to commit"
          else
            git commit -m "chore: bump packaging manifests to v${VERSION}"
            git push origin HEAD:main
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check.outputs.version }}
          name: v${{ needs.check.outputs.version }}
          files: out/*
          generate_release_notes: true
          token: ${{ steps.app_token.outputs.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Update npm to a version supporting trusted publishing
        run: npm install -g npm@latest

      - name: Create npmjs.org release
        run: npm publish --access public
        working-directory: packaging/npm/serv
